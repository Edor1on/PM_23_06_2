<div class="job-item" (click)="onClick()">
  <div class="d-flex justify-content-between align-items-baseline">
    <h6 class="job-title text-uppercase fw-bold mb-1">{{ title }}</h6>
    <span class="job-years">{{ date }}</span>
  </div>
  <p class="job-company">{{ subtitle }}</p>
  
  @if (description) {
    <p class="job-desc text-muted small">{{ description }}</p>
  }
</div>
@if (!isLast) {
  <br>
}
