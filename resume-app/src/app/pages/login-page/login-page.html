<div class="container mt-5 pt-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card shadow p-5 border-0 rounded-4">
        <h2 class="mb-4 fw-bold text-center">Вхід у систему</h2>
        
        <!-- Поле для логіну -->
        <div class="mb-3">
          <label for="username" class="form-label text-muted">Логін</label>
          <input type="text" id="username" class="form-control" 
                 [(ngModel)]="username" placeholder="Введіть логін">
        </div>

        <!-- Поле для пароля -->
        <div class="mb-4">
          <label for="password" class="form-label text-muted">Пароль</label>
          <input type="password" id="password" class="form-control" 
                 [(ngModel)]="password" placeholder="Введіть пароль">
        </div>

        <!-- Блок з помилкою (показується тільки якщо loginError = true) -->
        @if (loginError) {
          <div class="alert alert-danger py-2 mb-3 text-center">
            <small>Невірний логін або пароль!</small>
          </div>
        }

        <button (click)="onLogin()" class="btn btn-primary btn-lg w-100 rounded-pill shadow-sm">
          Увійти
        </button>
      </div>
    </div>
  </div>
</div>
